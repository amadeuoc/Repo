<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bullflow Alerts Viewer</title>

<style>
body {
  background:#0f1115;
  color:#f4f4f5;
  font-family:Arial, sans-serif;
  margin:24px;
}
input, button {
  padding:10px;
  border-radius:8px;
  border:1px solid #333;
  margin:4px;
}
button { cursor:pointer; font-weight:bold; }
.card {
  border:1px solid #2a2d35;
  background:#171a21;
  padding:14px;
  margin:10px 0;
  border-radius:12px;
}
.new {
  border-color:#22c55e;
  background:#13251a;
}
.meta {
  color:#a1a1aa;
  font-size:13px;
}
.badge {
  display:inline-block;
  padding:3px 8px;
  border-radius:999px;
  background:#272b35;
  margin-right:5px;
  font-size:12px;
}
.system { background:#312e81; }
.personal { background:#14532d; }
pre {
  white-space:pre-wrap;
  font-size:12px;
  background:#09090b;
  padding:10px;
  border-radius:8px;
  overflow:auto;
}
</style>
</head>

<body>

<h2>Bullflow Alerts Viewer</h2>

<div>
  <input id="email" placeholder="email">
  <input id="password" type="password" placeholder="password">
  <button id="loginBtn">Login</button>
  <label>
    <input id="soundToggle" type="checkbox" checked>
    so en alertes noves
  </label>
</div>

<hr>

<div id="status">Not logged</div>
<div id="counter">0 alertes</div>
<div id="alerts"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import {
  getFirestore,
  collection,
  query,
  where,
  orderBy,
  limit,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

async function validateAlertWithBackend(alert) {
  try {
    const res = await fetch("http://localhost:8000/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ alert })
    });

    return await res.json();

  } catch (err) {
    console.error("BACKEND VALIDATION ERROR", err);
    return {
      status: "error",
      decision: "SKIP",
      reason: err.message
    };
  }
}

const firebaseConfig = { apiKey: "AIzaSyAfa3y-u4PdIgOmqrXVXJKV6Up5ntyZDJU",
  authDomain: "liteflow-40a37.firebaseapp.com",
  projectId: "liteflow-40a37"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const alertsEl = document.getElementById("alerts");
const statusEl = document.getElementById("status");
const counterEl = document.getElementById("counter");

const alertsMap = new Map();
let personalInitialLoaded = false;
let systemInitialLoaded = false;

function parseOptionSymbol(sym = "") {
  if (!sym.startsWith("O:")) return sym || "—";

  const raw = sym.slice(2);
  const idx = raw.search(/\d{6}/);
  if (idx < 0) return sym;

  const ticker = raw.slice(0, idx);
  const yy = raw.slice(idx, idx + 2);
  const mm = raw.slice(idx + 2, idx + 4);
  const dd = raw.slice(idx + 4, idx + 6);
  const type = raw[idx + 6] === "C" ? "CALL" : "PUT";
  const strike = Number.parseInt(raw.slice(idx + 7), 10) / 1000;

  return `${ticker} ${strike} ${type} 20${yy}-${mm}-${dd}`;
}

function renderAll() {
  const list = [...alertsMap.values()];

  alertsEl.innerHTML = "";
  counterEl.textContent = `${list.length} alertes`;

  for (const item of list) {
    const data = item.data;

    const title = data.filterName || data.topic || data.alertName || "Alert";
    const symbol = data.symbol || data.sym || "";
    const premium = data.alertPremium ?? data.premium ?? data.p ?? "";
    const price = data.tradePrice ?? data.tp ?? "";
    const tags = data.activeTags || data.tags || data.tg || [];
    const execution = data.spread_execution || data.spreadExecution || data.se || "";
    const ts = getTimestamp(data);
    const decision = item.validation?.decision;

    const div = document.createElement("div");
    div.className = "card";

    if (decision === "VALID") {
      div.style.borderColor = "#22c55e";
      div.style.background = "#13251a";
    }

    if (decision === "REJECT") {
      div.style.borderColor = "#ef4444";
      div.style.background = "#2a1111";
    }

    div.innerHTML = `
      <div>
        <span class="badge ${item.source || ""}">${escapeHtml(item.source || "")}</span>
        <b>${escapeHtml(title)}</b>
      </div>

      <div style="margin-top:8px;font-size:18px">
        ${escapeHtml(parseOptionSymbol(symbol))}
      </div>

      <div class="meta" style="margin-top:8px">
        <span class="badge">Premium: ${escapeHtml(money(premium) || premium)}</span>
        <span class="badge">Price: ${escapeHtml(price)}</span>
        <span class="badge">Exec: ${escapeHtml(execution)}</span>
        <span class="badge">Time: ${escapeHtml(formatDate(ts))}</span>
      </div>

      <div class="meta" style="margin-top:8px">
        Tags: ${escapeHtml(Array.isArray(tags) ? tags.join(", ") : String(tags))}
      </div>

      ${item.validation ? `
        <details style="margin-top:10px">
          <summary>Validation result</summary>
          <pre>${escapeHtml(JSON.stringify(item.validation, null, 2))}</pre>
        </details>
      ` : `
        <div class="meta" style="margin-top:10px">
          Validation: pending...
        </div>
      `}

      <details style="margin-top:10px">
        <summary>Raw JSON</summary>
        <pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre>
      </details>
    `;

    alertsEl.appendChild(div);
  }
}
function addOrUpdateAlert(doc, source, isInitialLoad) {
  const data = doc.data();
  const key = doc.id;

  const existing = alertsMap.get(key);

  alertsMap.set(key, {
    data,
    source,
    validation: existing?.validation || null
  });

  if (!isInitialLoad) {
    validateAlertWithBackend(data).then(result => {
      console.log("BACKEND RESULT", result);

      const current = alertsMap.get(key);
      if (current) {
        current.validation = result;
        alertsMap.set(key, current);
        renderAll();
      }
    });
  }

  renderAll();
}

document.getElementById("loginBtn").onclick = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  await signInWithEmailAndPassword(auth, email, pass);
};

onAuthStateChanged(auth, (user) => {
  if (!user) return;

  const col = collection(db, "_flow_alerts");

  const q = query(col, orderBy("timestamp", "desc"), limit(20));

  onSnapshot(q, (snap) => {
    snap.docChanges().forEach(change => {
      addOrUpdateAlert(change.doc, "system", false);
    });
  });
});

window.validateAlertWithBackend = validateAlertWithBackend;
window.addOrUpdateAlert = addOrUpdateAlert;

</script>

</body>
</html>
