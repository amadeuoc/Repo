<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bullflow Alerts Viewer</title>
</head>

<body style="background:#111;color:white;font-family:sans-serif">

<h2>Bullflow Alerts Viewer</h2>

<input id="email" placeholder="email"><br><br>
<input id="password" type="password" placeholder="password"><br><br>
<button id="loginBtn">Login</button>

<hr>

<div id="status">Not logged</div>
<div id="alerts"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import {
  getFirestore,
  collection,
  query,
  where,
  orderBy,
  limit,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAfa3y-u4PdIgOmqrXVXJKV6Up5ntyZDJU",
  authDomain: "liteflow-40a37.firebaseapp.com",
  projectId: "liteflow-40a37"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const alertsEl = document.getElementById("alerts");

function parseOptionSymbol(sym = "") {
  if (!sym.startsWith("O:")) return sym;
  const raw = sym.slice(2);
  const idx = raw.search(/\d{6}/);
  if (idx < 0) return sym;

  const ticker = raw.slice(0, idx);
  const yy = raw.slice(idx, idx + 2);
  const mm = raw.slice(idx + 2, idx + 4);
  const dd = raw.slice(idx + 4, idx + 6);
  const type = raw[idx + 6] === "C" ? "CALL" : "PUT";
  const strike = Number.parseInt(raw.slice(idx + 7), 10) / 1000;

  return `${ticker} ${Number.isInteger(strike) ? strike : strike.toFixed(2)} ${type} 20${yy}-${mm}-${dd}`;
}

function renderAlert(data) {
  const div = document.createElement("div");
  div.style.border = "1px solid #333";
  div.style.padding = "10px";
  div.style.margin = "10px 0";

  div.innerHTML = `
    <b>${data.filterName || "Alert"}</b><br>
    ${parseOptionSymbol(data.symbol || data.sym || "")}<br>
    Premium: ${data.alertPremium || data.premium || ""}<br>
    <pre>${JSON.stringify(data, null, 2)}</pre>
  `;

  alertsEl.prepend(div);
}

document.getElementById("loginBtn").onclick = async () => {
  try {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    console.log("LOGIN TRY", email);

    await signInWithEmailAndPassword(auth, email, pass);

  } catch (e) {
    console.error("LOGIN ERROR", e);
    alert(e.message);
  }
};

onAuthStateChanged(auth, (user) => {
  console.log("AUTH STATE:", user);

  if (!user) {
    document.getElementById("status").innerText = "Not logged";
    return;
  }

  document.getElementById("status").innerText = "Logged: " + user.email;

  const col = collection(db, "_flow_alerts");

  console.log("START LISTENER...");

  const q = query(
    col,
    where("user", "==", user.email),
    orderBy("timestamp", "desc"),
    limit(50)
  );

  onSnapshot(q, (snap) => {
    console.log("SNAPSHOT", snap.size);

    snap.docChanges().forEach(change => {
      console.log("CHANGE", change.type, change.doc.data());

      if (change.type !== "removed") {
        renderAlert(change.doc.data());
      }
    });
  }, (err) => {
    console.error("FIRESTORE ERROR", err);
  });
});
</script>

</body>
</html>
